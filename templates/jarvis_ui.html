<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jarvis — AI-powered voice and text assistant with semantic NLU, RAG document QA, multi-user session isolation, and real-time WebSocket communication.">
    <meta name="theme-color" content="#050811">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <title>Jarvis - AI Voice & Text Assistant</title>
    <!-- Socket.io client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <!-- Premium Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/jarvis.css') }}">
</head>
<body>
    <div class="background-canvas"></div>
    <div class="grid-overlay"></div>
    <canvas class="particle-canvas" id="particle-canvas-1"></canvas>
    <canvas class="particle-canvas" id="particle-canvas-2"></canvas>
    
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header glass-panel">
            <div class="logo-container">
                <h1>J.A.R.V.I.S</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button id="sidebar-toggle-btn" class="mobile-sidebar-toggle">Manage Docs</button>
                <div id="connection-status-badge" class="connection-badge disconnected">
                    <span class="badge-dot"></span>
                    <span>Offline</span>
                </div>
            </div>
        </header>

        <!-- MAIN CHAT VIEWPORT -->
        <main class="main-content glass-panel chat-viewport">
            <!-- Scrollable Message Log -->
            <div id="chat-message-log" class="message-log">
                <!-- Conversation turns will inject here -->
            </div>

            <!-- Typed query input controls -->
            <div class="input-panel">
                <input type="text" id="chat-message-input" class="chat-input" placeholder="Type a command to Jarvis..." disabled>
                <button id="chat-send-btn" class="send-button" disabled>Send</button>
            </div>
        </main>

        <!-- SIDEBAR (Voice Orb + Document Manager) -->
        <aside id="sidebar-panel" class="sidebar">
            <!-- Voice Interactions -->
            <section class="voice-section glass-panel state-idle">
                <h2 class="voice-title">Voice Link</h2>
                
                <div id="ai-orb" class="orb-container">
                    <div id="orb-glow-elem" class="orb-glow"></div>
                    <div class="orb-ring r1"></div>
                    <div class="orb-ring r2"></div>
                    <div class="orb-ring r3"></div>
                    <div class="orb-element">
                        <img src="{{ url_for('static', filename='jarvis.png') }}" class="orb-image" alt="Jarvis Orb">
                    </div>
                </div>

                <div id="orb-status-text" class="voice-state-text">SYSTEM READY</div>
                <div id="orb-hint-text" class="voice-hint">Tap Orb or say "Jarvis" to begin</div>
                
                <!-- Equilizer visualization when speaking -->
                <div id="audio-visualizer" class="visualizer-container"></div>
                
                <button id="orb-interrupt-btn" class="interrupt-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    </svg>
                    <span>Interrupt Speech</span>
                </button>
            </section>

            <!-- Document Indexing / RAG Drawer -->
            <section class="document-section glass-panel">
                <div class="section-header">
                    <h2>Indexed Knowledge</h2>
                </div>

                <!-- Drag & Drop upload panel -->
                <div id="upload-dropzone" class="dropzone">
                    <div class="dropzone-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <div class="dropzone-text">Upload Knowledge Notes</div>
                    <div class="dropzone-subtext">PDF, TXT, or DOCX (Max 10MB)</div>
                    <input type="file" id="upload-file-input" accept=".txt,.pdf,.docx" style="display: none;">
                </div>

                <!-- Active Uploading statuses -->
                <div id="active-uploads-container" class="uploads-container"></div>

                <!-- List of current files -->
                <div id="indexed-documents-list" class="documents-scroll">
                    <!-- Session docs will list here -->
                </div>
            </section>
        </aside>
    </div>

    <!-- Background Particle Script -->
    <script>
        function createParticleSystem(canvasId, particleCount, color, speedFactor) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particlesArray;
            function setCanvasSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            class Particle {
                constructor(x, y, dirX, dirY, size, color) { this.x = x; this.y = y; this.dirX = dirX; this.dirY = dirY; this.size = size; this.color = color; }
                draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill(); }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.dirX = -this.dirX;
                    if (this.y > canvas.height || this.y < 0) this.dirY = -this.dirY;
                    this.x += this.dirX; this.y += this.dirY; this.draw();
                }
            }
            function init() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / particleCount;
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 1.5) + 1;
                    let x = Math.random() * (innerWidth - size * 2) + size; let y = Math.random() * (innerHeight - size * 2) + size;
                    let dirX = (Math.random() * 0.3 - 0.15) * speedFactor; let dirY = (Math.random() * 0.3 - 0.15) * speedFactor;
                    particlesArray.push(new Particle(x, y, dirX, dirY, size, color));
                }
            }
            function animate() { requestAnimationFrame(animate); ctx.clearRect(0, 0, innerWidth, innerHeight); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); } }
            window.addEventListener('resize', () => { setCanvasSize(); init(); });
            setCanvasSize(); init(); animate();
        }
        createParticleSystem('particle-canvas-1', 14000, 'rgba(255, 255, 255, 0.08)', 0.4);
        createParticleSystem('particle-canvas-2', 22000, 'rgba(59, 130, 246, 0.22)', 0.8);
    </script>

    <!-- App Entry Point Module -->
    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
